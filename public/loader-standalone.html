<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loader</title>

  <!-- =====================================================
    FONTS — swap these for whatever your project uses
    globe1 (big text)   → Sofia Sans Condensed (weight 900)
    globe2 (small text) → Spline Sans Mono     (weight 300)
    counter             → Poppins              (weight 400)
  ====================================================== -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400&family=Sofia+Sans+Condensed:wght@900&family=Spline+Sans+Mono:wght@300&display=swap"
    rel="stylesheet"
  />

  <style>
    /* Loader shown when <body> carries the .loading class */
    body.loading {
      overflow: hidden;
    }

    #loader {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #f5f5f5;   /* ← change background color here */
      z-index: 9999;
    }

    body.loading #loader {
      display: block;
    }

    #loader-canvas {
      display: block;
      width: 100%; height: 100%;
    }

    #percentage-counter {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 2px;
      color: #111;            /* ← match to your text color */
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <!-- =====================================================
    STEP 1 — Put this <script> as the VERY FIRST child of
    <body>, before the #loader div. It must run synchronously
    so the CSS class is set before the browser paints.
    Remove the sessionStorage check if you always want the
    loader to show (e.g. during development).
  ====================================================== -->
  <script>
    if (!sessionStorage.getItem('loaderShown')) {
      document.body.classList.add('loading');
    }
  </script>

  <!-- =====================================================
    STEP 2 — Loader markup
  ====================================================== -->
  <div id="loader">
    <canvas id="loader-canvas"></canvas>
    <div id="percentage-counter">0%</div>
  </div>

  <!-- Your page content goes here -->
  <main style="padding: 4rem; font-family: sans-serif;">
    <h1>Page content appears after the loader exits</h1>
    <p>Replace this with whatever your page contains.</p>
  </main>

  <!-- =====================================================
    STEP 3 — Dependencies (Three.js + GSAP)
    SRI hashes are pinned to r128 / 3.12.5.
    Update integrity= if you upgrade either library.
  ====================================================== -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
    integrity="sha512-dLxUelApnYxpLt6K2iomGngnHO83iUvZytA3YjDUCjT0HDOHKXnVYdf3hU4JjM8uEhxf9nD1/ey98U3t2vZ0qQ=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
    integrity="sha512-7eHRwcbYkK4d9g/6tD/mhkf++eoTHwpNM9woBxtPUBWm67zeAfFC+HrdoE2GanKeocly/VxeLvIqwvCdk7qScg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>

  <!-- =====================================================
    STEP 4 — Loader script
    Customise the CONFIG block at the top, leave the rest.
  ====================================================== -->
  <script>
  (function () {
    var loaderEl = document.getElementById('loader');
    if (!loaderEl || !document.body.classList.contains('loading')) return;

    /* ── CONFIG ──────────────────────────────────────────
       Edit these values to adapt the loader to any project.
    ──────────────────────────────────────────────────── */
    var CONFIG = {
      textColor:  '#000000',          // color of the sphere text
      bgColor:    0xf5f5f5,           // Three.js scene background (hex number)

      // Outer (bigger) sphere
      globe1Text:        'YOUR NAME   >   YOUR TITLE   &   KEYWORDS   ',
      globe1Font:        'Sofia Sans Condensed',
      globe1Weight:      900,
      globe1HeightScale: 1.45,        // vertical stretch of the text (1 = normal)

      // Inner (smaller) sphere
      globe2Text:        'KEYWORD ONE       •       KEYWORD TWO       •       KEYWORD THREE       •      ',
      globe2Font:        'Spline Sans Mono',
      globe2Weight:      300,
      globe2HeightScale: 1,

      minDuration: 4,                 // seconds before loader can exit (fake progress)
    };
    /* ── END CONFIG ─────────────────────────────────────── */

    var scene    = new THREE.Scene();
    var camera   = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    var renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('loader-canvas'), antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(CONFIG.bgColor);
    renderer.setSize(window.innerWidth, window.innerHeight);
    scene.add(new THREE.AmbientLight(0xffffff, 1));

    function createTextTexture(text, heightScale, fontWeight, fontFamily) {
      var c   = document.createElement('canvas');
      var ctx = c.getContext('2d');
      c.width = 8192; c.height = 4096;
      ctx.clearRect(0, 0, c.width, c.height);
      var t = text + ' ';
      ctx.font = fontWeight + ' 100px "' + fontFamily + '", sans-serif';
      var finalSize = 100 * (c.width / ctx.measureText(t).width);
      ctx.font = fontWeight + ' ' + finalSize + 'px "' + fontFamily + '", sans-serif';
      ctx.fillStyle   = CONFIG.textColor;
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
      ctx.lineWidth   = finalSize * 0.018;
      ctx.lineJoin    = 'round';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.save();
      ctx.translate(c.width / 2, c.height / 2);
      ctx.scale(1, heightScale);
      ctx.strokeText(t, 0, 0);
      ctx.fillText(t, 0, 0);
      ctx.restore();
      var tex = new THREE.CanvasTexture(c);
      tex.minFilter = THREE.LinearMipmapLinearFilter;
      tex.magFilter = THREE.LinearFilter;
      tex.wrapS     = THREE.RepeatWrapping;
      tex.wrapT     = THREE.ClampToEdgeWrapping;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.needsUpdate = true;
      return tex;
    }

    function createTextSphere(text, heightScale, fontWeight, fontFamily) {
      var group = new THREE.Group();
      var tex   = createTextTexture(text, heightScale, fontWeight, fontFamily);
      var mat   = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false });
      group.add(new THREE.Mesh(new THREE.SphereGeometry(1.5, 64, 64), mat));
      group.userData.tex = tex;
      return group;
    }

    var masterGroup = new THREE.Group();
    masterGroup.rotation.x = Math.PI / 24;
    scene.add(masterGroup);

    var globe1 = createTextSphere(CONFIG.globe1Text, CONFIG.globe1HeightScale, CONFIG.globe1Weight, CONFIG.globe1Font);
    var globe2 = createTextSphere(CONFIG.globe2Text, CONFIG.globe2HeightScale, CONFIG.globe2Weight, CONFIG.globe2Font);
    globe1.userData.tex.offset.x = -25 / 64;
    masterGroup.add(globe1, globe2);

    // Mouse parallax
    var mouse = { x: 0, y: 0 };
    var tgt   = { x: 0, y: 0 };
    window.addEventListener('mousemove', function (e) {
      mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
      mouse.y = (e.clientY / window.innerHeight) * 2 - 1;
    });

    (function animateLoader() {
      requestAnimationFrame(animateLoader);
      globe1.userData.tex.offset.x += 0.0004;
      globe2.userData.tex.offset.x += 0.0008;
      tgt.x += (mouse.y * 0.4 - tgt.x) * 0.05;
      tgt.y += (mouse.x * 0.4 - tgt.y) * 0.05;
      var r = 6, phi = Math.PI / 2 - tgt.x - 0.2, theta = tgt.y;
      camera.position.set(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
      camera.lookAt(0, 0, 0);
      renderer.render(scene, camera);
    })();

    // Intro: spheres fly in from below
    globe1.position.set( 1.5, -15, 0);
    globe2.position.set(-1.5, -15, 0);
    var introTl = gsap.timeline({ delay: 0.2 });
    introTl.to(globe1.position, { x: 0, y:  0.35, duration: 2.5, ease: 'power4.out' });
    introTl.to(globe2.position, { x: 0, y: -0.15, duration: 1.8, ease: 'power4.out' }, '-=2.0');

    // Progress counter: 0→95% over minDuration, then snap to 100% when page is ready
    var counter       = { value: 0 };
    var percentageDiv = document.getElementById('percentage-counter');
    var minDone = false, pageDone = false;

    gsap.to(counter, {
      value: 95, duration: CONFIG.minDuration, ease: 'none',
      onUpdate:  function () { percentageDiv.textContent = Math.round(counter.value) + '%'; },
      onComplete: function () { minDone = true; tryExit(); }
    });

    function tryExit() {
      if (!minDone || !pageDone) return;
      gsap.to(counter, {
        value: 100, duration: 0.3, ease: 'none',
        onUpdate:  function () { percentageDiv.textContent = Math.round(counter.value) + '%'; },
        onComplete: runExitAnimation
      });
    }

    if (document.readyState === 'complete') {
      pageDone = true;
    } else {
      window.addEventListener('load', function () { pageDone = true; tryExit(); });
    }

    function runExitAnimation() {
      var exitTl = gsap.timeline();
      exitTl.to('#percentage-counter', { opacity: 0, duration: 0.3 }, 0);
      exitTl.to(globe2.position, { x: -1.5, y: -15, duration: 1.0, ease: 'power4.in' }, 0);
      exitTl.to(globe1.position, { x:  1.5, y: -15, duration: 1.3, ease: 'power4.in' }, 0.05);
      exitTl.to('#loader', {
        opacity: 0, duration: 0.8,
        onStart: function () {
          // Hook: called the moment the loader starts fading.
          // Fire your page's intro animations here, e.g.:
          //   if (typeof window.startHeroAnimations === 'function') window.startHeroAnimations();
        },
        onComplete: function () {
          loaderEl.style.display = 'none';
          document.body.classList.remove('loading');
          sessionStorage.setItem('loaderShown', 'true');
        }
      }, 0.8);
    }

    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  })();
  </script>

</body>
</html>
